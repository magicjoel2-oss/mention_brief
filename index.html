<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mention Brief</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
<style>
  :root {
    --teal: #0F4C5C;
    --ink: #0A0A0A;
    --sub: #525252;
    --faint: #A3A3A3;
    --line: #E7E5E4;
    --bg: #FAFAF9;
    --paper: #FFFFFF;
    --green: #16A34A;
    --red: #DC2626;
    --orange: #C2410C;
    --font-body: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    padding: 32px 20px 80px;
    min-height: 100vh;
    line-height: 1.55;
  }
  .container { max-width: 820px; margin: 0 auto; }
  .loading {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    color: var(--sub); font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.5px;
  }

  /* 헤더 */
  header { margin-bottom: 28px; }
  .head-meta {
    display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
    margin-bottom: 6px;
  }
  .head-title {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 1.5px;
    color: var(--teal); text-transform: uppercase; font-weight: 600;
  }
  .head-count {
    font-family: var(--font-mono); font-size: 11px; color: var(--faint);
  }
  h1 { font-size: 36px; font-weight: 800; letter-spacing: -0.8px; line-height: 1.15; margin: 0; }
  .head-sub { margin-top: 8px; font-size: 14px; color: var(--sub); }

  /* 통계 */
  .stats {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
    margin-bottom: 28px;
  }
  .stat {
    background: var(--paper); border: 1px solid var(--line); border-radius: 4px;
    padding: 16px 14px; position: relative; overflow: hidden;
  }
  .stat::before {
    content: ""; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
    background: var(--accent, var(--teal));
  }
  .stat-label {
    font-family: var(--font-mono); font-size: 10px; color: var(--faint);
    letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 4px;
  }
  .stat-value {
    font-size: 32px; font-weight: 800; line-height: 1; color: var(--accent, var(--teal));
    font-family: var(--font-mono); letter-spacing: -1px;
  }
  .stat-sub { font-size: 10px; color: var(--faint); margin-top: 6px; line-height: 1.3; }

  /* 일별 네비 */
  nav.day-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px; padding: 12px 16px;
    background: var(--paper); border: 1px solid var(--line); border-radius: 4px;
  }
  nav.day-nav button {
    font-family: var(--font-body); font-size: 13px; color: var(--teal);
    background: transparent; border: none; padding: 6px 10px;
    font-weight: 600; cursor: pointer;
  }
  nav.day-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-center { text-align: center; }
  .nav-tag {
    font-family: var(--font-mono); font-size: 11px; color: var(--faint);
    letter-spacing: 1px; margin-bottom: 2px;
  }
  .nav-date {
    font-size: 16px; font-weight: 700; font-family: var(--font-mono); letter-spacing: -0.3px;
  }

  /* 필터/액션 */
  .filter-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px; padding: 0 4px;
  }
  .filter-row label {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--sub); cursor: pointer; user-select: none;
  }
  .filter-row label input { accent-color: var(--teal); width: 14px; height: 14px; }
  .reset-btn {
    font-size: 12px; color: var(--faint); background: transparent; border: none;
    cursor: pointer; text-decoration: underline; font-family: var(--font-body);
    transition: color 0.15s ease;
  }
  .reset-btn.confirming { color: var(--red); font-weight: 600; }

  /* 메인 카드 */
  main.cards { display: flex; flex-direction: column; gap: 14px; }

  .card {
    background: var(--paper); border: 1px solid var(--line);
    border-left: 3px solid var(--p-border, var(--faint));
    border-radius: 4px; padding: 18px;
    transition: opacity 0.2s ease;
  }
  .card.checked { opacity: 0.55; border-left-color: #86EFAC; }

  .meta {
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    margin-bottom: 10px; font-size: 12px; color: var(--sub);
  }
  .author { font-weight: 600; color: var(--ink); }
  .dot { color: var(--faint); }
  .time { font-family: var(--font-mono); font-size: 11px; color: var(--faint); }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
    padding: 3px 7px; border-radius: 3px;
    background: var(--p-bg); color: var(--p-text);
    border: 1px solid var(--p-border-soft);
  }
  .cc-badge {
    font-family: var(--font-mono); font-size: 10px; padding: 2px 6px;
    border: 1px solid var(--line); border-radius: 3px; color: var(--faint); letter-spacing: 0.5px;
  }

  .original {
    font-size: 14px; line-height: 1.65; color: var(--ink);
    margin-bottom: 12px; padding-left: 12px; border-left: 2px solid var(--line);
    white-space: pre-wrap; word-break: break-word;
  }
  .row-tag {
    font-family: var(--font-mono); font-size: 10px; color: var(--faint);
    letter-spacing: 1px; margin-right: 6px;
  }
  .summary { font-size: 13px; color: var(--sub); line-height: 1.6; margin-bottom: 10px; }
  .recommend { font-size: 13px; color: var(--teal); line-height: 1.6; }
  .recommend .row-tag { color: var(--teal); font-weight: 600; }

  .links { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
  .links a {
    font-size: 12px; color: var(--teal); text-decoration: none;
    font-family: var(--font-mono); letter-spacing: -0.2px;
  }
  .links a:hover { text-decoration: underline; }

  .check-row {
    margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--line);
    display: flex; align-items: center; justify-content: space-between;
  }
  .check-label {
    display: inline-flex; align-items: center; gap: 8px;
    cursor: pointer; font-size: 13px; font-weight: 600;
    color: var(--ink); user-select: none;
  }
  .check-label.checked { color: var(--green); }
  .check-label input {
    width: 16px; height: 16px; accent-color: var(--green); cursor: pointer;
  }
  .checked-at {
    font-family: var(--font-mono); font-size: 11px; color: var(--faint);
  }

  /* Overdue 섹션 */
  section.overdue { margin-top: 56px; }
  .overdue-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--ink);
  }
  .overdue-tag {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 1.5px;
    color: var(--orange); text-transform: uppercase; font-weight: 600; margin-bottom: 2px;
  }
  .overdue-header h2 { font-size: 22px; font-weight: 800; margin: 0; letter-spacing: -0.4px; }
  .overdue-meta { font-size: 12px; color: var(--faint); font-family: var(--font-mono); }
  .overdue-list { display: flex; flex-direction: column; gap: 10px; }

  /* Resolved 섹션 */
  section.resolved { margin-top: 36px; }
  .resolved-toggle {
    width: 100%; display: flex; align-items: baseline; justify-content: space-between;
    padding: 0 0 10px 0; background: transparent; border: none;
    border-bottom: 1px solid var(--line); cursor: pointer; text-align: left;
    font-family: var(--font-body); margin-bottom: 0;
  }
  .resolved-toggle.open { margin-bottom: 14px; }
  .resolved-tag {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 1.5px;
    color: var(--green); text-transform: uppercase; font-weight: 600; margin-bottom: 2px;
  }
  .resolved-toggle h2 { font-size: 18px; font-weight: 700; margin: 0; letter-spacing: -0.3px; color: var(--sub); }
  .resolved-right { display: flex; align-items: center; gap: 10px; }
  .resolved-retention { font-size: 11px; color: var(--faint); font-family: var(--font-mono); }
  .chevron {
    font-family: var(--font-mono); font-size: 13px; color: var(--sub);
    transition: transform 0.2s ease; display: inline-block;
  }
  .chevron.open { transform: rotate(90deg); }

  /* Overdue/Resolved 카드 */
  .small-card {
    background: var(--paper); border: 1px solid var(--line);
    border-left: 3px solid var(--p-border, var(--faint));
    border-radius: 4px; padding: 14px;
    display: flex; gap: 12px; align-items: flex-start;
    transition: opacity 0.2s ease, border-left-color 0.2s ease;
  }
  .small-card.checked { opacity: 0.7; border-left-color: #86EFAC; }
  .small-card input {
    width: 16px; height: 16px; accent-color: var(--green); cursor: pointer;
    margin-top: 3px; flex-shrink: 0;
  }
  .small-card .body { flex: 1; min-width: 0; }
  .small-card .small-meta {
    display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
    margin-bottom: 4px; font-size: 11px;
  }
  .small-card .small-meta .author { font-size: 12px; }
  .small-card .small-meta .chat { color: var(--sub); font-size: 12px; }
  .small-card .small-summary { font-size: 13px; color: var(--sub); line-height: 1.5; }
  .small-card .small-checked-at {
    margin-top: 6px; font-family: var(--font-mono); font-size: 10px;
    color: var(--faint); letter-spacing: 0.3px;
  }

  /* Empty */
  .empty {
    text-align: center; padding: 64px 20px;
    background: var(--paper); border: 1px dashed var(--line); border-radius: 4px;
  }
  .empty .icon { font-size: 32px; margin-bottom: 8px; }
  .empty .title { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  .empty .desc { font-size: 13px; color: var(--sub); margin-bottom: 16px; }
  .empty button {
    font-size: 13px; color: var(--teal); background: transparent;
    border: 1px solid var(--teal); padding: 8px 16px; border-radius: 3px;
    cursor: pointer; font-family: var(--font-body); font-weight: 600;
  }

  /* Footer */
  footer {
    margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--line);
    font-family: var(--font-mono); font-size: 11px; color: var(--faint);
    display: flex; justify-content: space-between;
  }

  .error-banner {
    background: #FEF2F2; border: 1px solid var(--red); color: #991B1B;
    padding: 12px 14px; border-radius: 4px; margin-bottom: 20px; font-size: 13px;
  }
  .stale-banner {
    background: #FFFBEB; border: 1px solid #F59E0B; color: #92400E;
    padding: 12px 14px; border-radius: 4px; margin-bottom: 20px;
    font-size: 13px; display: flex; align-items: center; gap: 10px;
  }
  .stale-banner::before { content: "⚠"; font-size: 16px; flex-shrink: 0; }

  /* Gate */
  .gate {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(250, 250, 249, 0.7);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
  }
  .gate-modal {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 6px; padding: 28px 28px 24px;
    width: 92%; max-width: 420px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.08);
  }
  .gate-title {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 1.5px;
    color: var(--teal); text-transform: uppercase; font-weight: 600;
    margin: 0 0 12px;
  }
  .gate-question {
    font-size: 16px; font-weight: 700; line-height: 1.45;
    margin: 0 0 18px; color: var(--ink);
  }
  .gate-input {
    width: 100%; padding: 10px 12px; border: 1px solid var(--line);
    border-radius: 4px; font-size: 14px; font-family: var(--font-body);
    margin-bottom: 10px; box-sizing: border-box;
  }
  .gate-input:focus { outline: 2px solid var(--teal); outline-offset: -1px; border-color: var(--teal); }
  .gate-remember {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--sub); cursor: pointer;
    margin-bottom: 14px; user-select: none;
  }
  .gate-remember input { accent-color: var(--teal); width: 14px; height: 14px; }
  .gate-submit {
    width: 100%; padding: 10px; border: none; border-radius: 4px;
    background: var(--teal); color: white; font-weight: 600; font-size: 14px;
    cursor: pointer; font-family: var(--font-body);
  }
  .gate-submit:disabled { opacity: 0.5; cursor: wait; }
  .gate-error {
    margin-top: 10px; font-size: 12px; color: var(--red); min-height: 14px;
  }
</style>
</head>
<body>
<div id="gate" class="gate" style="display:none">
  <div class="gate-modal">
    <div class="gate-title">접근 확인</div>
    <p id="gate-question" class="gate-question">로딩 중…</p>
    <input id="gate-input" class="gate-input" type="password" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
    <label class="gate-remember">
      <input id="gate-remember-cb" type="checkbox" checked />
      이 브라우저에 저장
    </label>
    <button id="gate-submit" class="gate-submit">확인</button>
    <div id="gate-error" class="gate-error"></div>
  </div>
</div>
<div id="app" class="loading">loading…</div>

<script>
// ====================================================================
// 디자인 토큰 (CSS 변수와 별도, JS에서 우선순위 색상 룩업용)
// ====================================================================
const PRIORITY = {
  high:   { label: "응답 필요", short: "HIGH",   bg: "#FEF2F2", border: "#DC2626", text: "#991B1B" },
  medium: { label: "검토",      short: "MID",    bg: "#FFF7ED", border: "#C2410C", text: "#9A3412" },
  low:    { label: "참고 (cc)", short: "LOW",    bg: "#F5F5F4", border: "#78716C", text: "#44403C" },
  info:   { label: "정보",      short: "INFO",   bg: "#F8FAFC", border: "#64748B", text: "#475569" },
  casual: { label: "비업무",    short: "CASUAL", bg: "#FAF5FF", border: "#9333EA", text: "#6B21A8" },
};

const RESOLVED_RETENTION_DAYS = 14;
const RESOLVED_RETENTION_MS = RESOLVED_RETENTION_DAYS * 24 * 60 * 60 * 1000;
const STORAGE_KEY = "mention-brief:checks";

// ====================================================================
// 상태
// ====================================================================
const state = {
  manifest: null,    // index.json
  digests: {},       // { [date]: dayJson }
  dateIdx: 0,        // 현재 보고 있는 날짜 인덱스 (manifest.dates 기준)
  showChecked: true,
  showResolved: false,
  confirmingReset: false,
  confirmingResetTimer: null,
  checks: {},        // { [id]: { checked, checkedAt } }
};

// ====================================================================
// 영구 저장
// ====================================================================
function loadChecks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}
function saveChecks() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.checks));
  } catch (e) {
    console.error("Save failed:", e);
  }
}

// ====================================================================
// 데이터 로드
// ====================================================================
async function fetchJSON(path) {
  const res = await fetch(path + "?t=" + Date.now()); // 캐시 방지
  if (!res.ok) throw new Error(`Failed to fetch ${path}: ${res.status}`);
  return await res.json();
}

// ---- Gate / decryption ------------------------------------------------------
const GATE_STORAGE = "mention-brief:gate-answer";

function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function deriveGateKey(answer, saltB64, iterations) {
  const baseKey = await crypto.subtle.importKey(
    "raw",
    new TextEncoder().encode(answer),
    "PBKDF2",
    false,
    ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64ToBytes(saltB64), iterations, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function decryptPayload(payload, key) {
  // Node's crypto.createCipheriv produces ciphertext||tag (last 16 bytes).
  // Web Crypto AES-GCM expects the same shape, so just pass it through.
  const iv = b64ToBytes(payload.iv);
  const ct = b64ToBytes(payload.ct);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

async function loadDailyDecrypted(date) {
  const raw = await fetchJSON(`./data/${date}.json`);
  if (raw && raw.enc === "AES-256-GCM" && state.gateKey) {
    return decryptPayload(raw, state.gateKey);
  }
  return raw; // plaintext fallback (pre-gate seed data)
}

async function tryUnlock(answer) {
  if (!state.gateConfig || !state.manifest) return false;
  const key = await deriveGateKey(answer, state.gateConfig.salt, state.gateConfig.iterations);
  // Test by decrypting the newest daily. If manifest has no dates, accept the
  // answer optimistically (first run, nothing to test against).
  const dates = state.manifest.dates || [];
  if (dates.length === 0) {
    state.gateKey = key;
    return true;
  }
  const probeDate = dates[0].date;
  const raw = await fetchJSON(`./data/${probeDate}.json`);
  if (!raw || raw.enc !== "AES-256-GCM") {
    // plaintext (pre-gate). Accept and move on.
    state.gateKey = key;
    return true;
  }
  try {
    await decryptPayload(raw, key);
    state.gateKey = key;
    return true;
  } catch {
    return false;
  }
}

function showGate(question) {
  const gate = document.getElementById("gate");
  document.getElementById("gate-question").textContent = question;
  document.getElementById("gate-error").textContent = "";
  gate.style.display = "flex";
  setTimeout(() => document.getElementById("gate-input").focus(), 0);
}

function hideGate() {
  document.getElementById("gate").style.display = "none";
}

async function handleGateSubmit() {
  const input = document.getElementById("gate-input");
  const btn = document.getElementById("gate-submit");
  const err = document.getElementById("gate-error");
  const remember = document.getElementById("gate-remember-cb").checked;
  const answer = input.value;
  if (!answer) return;
  btn.disabled = true;
  err.textContent = "확인 중…";
  try {
    const ok = await tryUnlock(answer);
    if (!ok) {
      err.textContent = "답이 일치하지 않습니다.";
      btn.disabled = false;
      input.select();
      return;
    }
    if (remember) {
      try { localStorage.setItem(GATE_STORAGE, answer); } catch {}
    } else {
      try { localStorage.removeItem(GATE_STORAGE); } catch {}
    }
    hideGate();
    await loadDateAndPrev();
    render();
  } catch (e) {
    err.textContent = "오류: " + e.message;
    btn.disabled = false;
  }
}

async function init() {
  state.checks = loadChecks();
  try {
    // load config + manifest in parallel (both are plaintext)
    const [cfg, manifest] = await Promise.all([
      fetchJSON("./data/_config.json").catch(() => null),
      fetchJSON("./data/index.json"),
    ]);
    state.manifest = manifest;
    state.dateIdx = 0;

    if (!state.manifest.dates || state.manifest.dates.length === 0) {
      renderError("아직 디지스트 데이터가 없습니다. 자동화 첫 실행 후 다시 방문하세요.");
      return;
    }

    if (cfg && cfg.question) {
      // Gate active. Try the cached answer first; otherwise show the modal.
      state.gateConfig = cfg;
      const cached = (() => { try { return localStorage.getItem(GATE_STORAGE); } catch { return null; } })();
      if (cached && await tryUnlock(cached)) {
        await loadDateAndPrev();
        render();
        return;
      }
      // bind handlers once
      document.getElementById("gate-submit").addEventListener("click", handleGateSubmit);
      document.getElementById("gate-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleGateSubmit();
      });
      showGate(cfg.question);
      return;
    }

    // No gate configured: legacy plaintext flow.
    await loadDateAndPrev();
    render();
  } catch (e) {
    renderError("데이터를 불러오지 못했습니다: " + e.message);
  }
}

async function loadDateAndPrev() {
  // 현재 날짜 + 이전 모든 날짜 로드 (overdue 추적용)
  const promises = state.manifest.dates.map(async (d) => {
    if (!state.digests[d.date]) {
      try {
        state.digests[d.date] = await loadDailyDecrypted(d.date);
      } catch (e) {
        console.warn(`Failed to load ${d.date}:`, e);
        state.digests[d.date] = { date: d.date, items: [] };
      }
    }
  });
  await Promise.all(promises);
}

// ====================================================================
// 계산: overdue / resolved
// ====================================================================
function computeOverdueResolved() {
  // 현재보다 과거 날짜의 high/medium 항목 중
  // - 미체크 = overdue
  // - 체크됨 + 14일 이내 = resolved
  const overdue = [];
  const resolved = [];
  const now = Date.now();

  for (let i = state.dateIdx + 1; i < state.manifest.dates.length; i++) {
    const d = state.manifest.dates[i];
    const digest = state.digests[d.date];
    if (!digest) continue;

    for (const it of digest.items) {
      if (it.priority !== "high" && it.priority !== "medium") continue;
      const c = state.checks[it.id];
      const withDate = { ...it, date: d.date };
      if (!c?.checked) {
        overdue.push(withDate);
      } else if (c.checkedAt) {
        const age = now - new Date(c.checkedAt).getTime();
        if (age < RESOLVED_RETENTION_MS) {
          resolved.push({ ...withDate, checkedAt: c.checkedAt });
        }
      }
    }
  }

  // resolved 최신 체크 순
  resolved.sort((a, b) => new Date(b.checkedAt) - new Date(a.checkedAt));
  return { overdue, resolved };
}

// ====================================================================
// 토글
// ====================================================================
function toggle(id) {
  const cur = state.checks[id];
  if (cur?.checked) {
    state.checks[id] = { checked: false, checkedAt: null };
  } else {
    state.checks[id] = { checked: true, checkedAt: new Date().toISOString() };
  }
  saveChecks();
  render();
}

function resetTodayChecks() {
  if (!state.confirmingReset) {
    state.confirmingReset = true;
    clearTimeout(state.confirmingResetTimer);
    state.confirmingResetTimer = setTimeout(() => {
      state.confirmingReset = false;
      render();
    }, 3000);
    render();
    return;
  }
  state.confirmingReset = false;
  clearTimeout(state.confirmingResetTimer);
  const today = state.manifest.dates[state.dateIdx];
  const digest = state.digests[today.date];
  if (digest) {
    for (const it of digest.items) {
      state.checks[it.id] = { checked: false, checkedAt: null };
    }
  }
  saveChecks();
  render();
}

// ====================================================================
// 렌더링
// ====================================================================
function escapeHtml(s) {
  if (s == null) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function priorityBadge(priority) {
  const p = PRIORITY[priority] || PRIORITY.info;
  return `<span class="badge" style="--p-bg:${p.bg};--p-text:${p.text};--p-border-soft:${p.border}40">${p.short}</span>`;
}

function ccBadge() { return `<span class="cc-badge">cc</span>`; }

function isStale() {
  // 자동화가 매일 09:00 KST에 도는데 오늘 디지스트가 아직 없으면 stale로 감지.
  // 단 09:30 KST 이전이면 아직 자동화 안 돈 정상 상황이라 배너 안 띄움 (false alarm 방지).
  if (!state.manifest?.dates?.length) return false;
  const latest = state.manifest.dates[0].date;
  const kstNow = new Date(Date.now() + 9 * 3600 * 1000);
  const todayKst = kstNow.toISOString().slice(0, 10);
  if (latest === todayKst) return false;
  const kstHour = kstNow.getUTCHours();
  const kstMin = kstNow.getUTCMinutes();
  if (kstHour < 9 || (kstHour === 9 && kstMin < 30)) return false;
  return true;
}

function renderError(msg) {
  document.getElementById("app").outerHTML = `
    <div id="app">
      <div class="container">
        <div class="error-banner">${escapeHtml(msg)}</div>
      </div>
    </div>`;
}

function renderCard(item) {
  const c = state.checks[item.id];
  const checked = !!c?.checked;
  const p = PRIORITY[item.priority] || PRIORITY.info;
  const checkedAtStr = c?.checkedAt
    ? new Date(c.checkedAt).toLocaleString("ko-KR", { dateStyle: "short", timeStyle: "short" })
    : "";

  const ccHtml = item.isCC ? ccBadge() : "";
  const linksHtml = (item.links || []).length > 0
    ? `<div class="links">` +
      item.links.map(l => `<a href="${escapeHtml(l.url)}" target="_blank" rel="noreferrer">→ ${escapeHtml(l.label)}</a>`).join("") +
      `</div>`
    : "";
  const recommendHtml = item.recommend
    ? `<div class="recommend"><span class="row-tag">REC</span>${escapeHtml(item.recommend)}</div>`
    : "";

  return `
    <article class="card ${checked ? "checked" : ""}" style="--p-border:${p.border}">
      <div class="meta">
        ${priorityBadge(item.priority)}
        ${ccHtml}
        <span class="author">${escapeHtml(item.author)}</span>
        <span class="dot">·</span>
        <span>${escapeHtml(item.chat)}</span>
        <span class="dot">·</span>
        <span class="time">${escapeHtml(item.time)}</span>
      </div>
      <div class="original">${escapeHtml(item.original)}</div>
      <div class="summary"><span class="row-tag">SUM</span>${escapeHtml(item.summary)}</div>
      ${recommendHtml}
      ${linksHtml}
      <div class="check-row">
        <label class="check-label ${checked ? "checked" : ""}">
          <input type="checkbox" ${checked ? "checked" : ""} data-toggle-id="${escapeHtml(item.id)}" />
          ${checked ? "확인 완료" : "확인 표시"}
        </label>
        ${checked && checkedAtStr ? `<span class="checked-at">${escapeHtml(checkedAtStr)}</span>` : ""}
      </div>
    </article>`;
}

function renderSmallCard(item, checked) {
  const p = PRIORITY[item.priority] || PRIORITY.info;
  const checkedAtStr = item.checkedAt
    ? new Date(item.checkedAt).toLocaleString("ko-KR", { dateStyle: "short", timeStyle: "short" })
    : "";
  return `
    <div class="small-card ${checked ? "checked" : ""}" style="--p-border:${p.border}">
      <input type="checkbox" ${checked ? "checked" : ""} data-toggle-id="${escapeHtml(item.id)}" aria-label="${checked ? "확인 해제" : "확인 표시"}" />
      <div class="body">
        <div class="small-meta">
          ${priorityBadge(item.priority)}
          <span class="time">${escapeHtml(item.date)}</span>
          <span class="dot">·</span>
          <span class="author">${escapeHtml(item.author)}</span>
          <span class="dot">·</span>
          <span class="chat">${escapeHtml(item.chat)}</span>
        </div>
        <div class="small-summary">${escapeHtml(item.summary)}</div>
        ${checked && checkedAtStr ? `<div class="small-checked-at">확인: ${escapeHtml(checkedAtStr)}</div>` : ""}
      </div>
    </div>`;
}

function render() {
  const today = state.manifest.dates[state.dateIdx];
  const digest = state.digests[today.date];
  const items = digest ? digest.items : [];
  const checkedTodayCount = items.filter(it => state.checks[it.id]?.checked).length;
  const uncheckedToday = items.length - checkedTodayCount;
  const { overdue, resolved } = computeOverdueResolved();

  const visibleItems = state.showChecked ? items : items.filter(it => !state.checks[it.id]?.checked);

  const stat = (label, value, accent, sub) => `
    <div class="stat" style="--accent:${accent}">
      <div class="stat-label">${escapeHtml(label)}</div>
      <div class="stat-value">${value}</div>
      ${sub ? `<div class="stat-sub">${escapeHtml(sub)}</div>` : ""}
    </div>`;

  const overdueColor = overdue.length > 0 ? "#C2410C" : "#0F4C5C";
  const uncheckedColor = uncheckedToday > 0 ? "#DC2626" : "#0F4C5C";

  const navTagText = state.dateIdx === 0 ? "TODAY" : "PAST";
  const isFirst = state.dateIdx === 0;
  const isLast = state.dateIdx === state.manifest.dates.length - 1;

  const cardsHtml = visibleItems.length === 0
    ? `<div class="empty">
        <div class="icon">✓</div>
        <div class="title">이 날짜의 멘션 모두 확인됨</div>
        <div class="desc">${items.length - visibleItems.length > 0
          ? `${items.length - visibleItems.length}건이 숨겨져 있습니다.`
          : "이 날짜의 멘션이 없습니다."}</div>
        ${items.length - visibleItems.length > 0
          ? `<button data-action="show-checked">확인된 항목 다시 보기</button>`
          : ""}
      </div>`
    : visibleItems.map(renderCard).join("");

  const overdueHtml = overdue.length === 0 ? "" : `
    <section class="overdue">
      <div class="overdue-header">
        <div>
          <div class="overdue-tag">Overdue</div>
          <h2>누적 미해결 ${overdue.length}건</h2>
        </div>
        <div class="overdue-meta">이전 디지스트 · 응답 필요 / 검토</div>
      </div>
      <div class="overdue-list">
        ${overdue.map(it => renderSmallCard(it, false)).join("")}
      </div>
    </section>`;

  const resolvedHtml = resolved.length === 0 ? "" : `
    <section class="resolved">
      <button class="resolved-toggle ${state.showResolved ? "open" : ""}" data-action="toggle-resolved" aria-expanded="${state.showResolved}">
        <div>
          <div class="resolved-tag">Resolved</div>
          <h2>해결된 건 ${resolved.length}건</h2>
        </div>
        <div class="resolved-right">
          <span class="resolved-retention">${RESOLVED_RETENTION_DAYS}일 이내 · 자동 정리</span>
          <span class="chevron ${state.showResolved ? "open" : ""}" aria-hidden="true">▸</span>
        </div>
      </button>
      ${state.showResolved
        ? `<div class="overdue-list">${resolved.map(it => renderSmallCard(it, true)).join("")}</div>`
        : ""}
    </section>`;

  const staleBanner = isStale()
    ? `<div class="stale-banner">자동화가 오늘 돌지 않은 것 같습니다. 마지막 갱신: ${escapeHtml(state.manifest.dates[0].date)} · <code>logs/digest-${escapeHtml(new Date(Date.now() + 9*3600*1000).toISOString().slice(0,10))}.log</code> 확인 권장</div>`
    : "";

  const html = `
    <div class="container">
      ${staleBanner}
      <header>
        <div class="head-meta">
          <div class="head-title">Mention Brief — magicjoel</div>
          <div class="head-count">${state.manifest.dates.length}일 누적</div>
        </div>
        <h1>오늘의 멘션</h1>
        <div class="head-sub">지난 24시간 Teams 멘션 — 확인한 항목은 체크해 두면 누적 미해결에서 제외됩니다.</div>
      </header>

      <section class="stats">
        ${stat("오늘 들어옴", items.length, "#0F4C5C")}
        ${stat("미확인", uncheckedToday, uncheckedColor)}
        ${stat("누적 미해결", overdue.length, overdueColor, "이전 응답필요/검토 중 미체크")}
      </section>

      <nav class="day-nav">
        <button data-action="prev" ${isLast ? "disabled" : ""}>← 이전</button>
        <div class="nav-center">
          <div class="nav-tag">${navTagText}</div>
          <div class="nav-date">${escapeHtml(today.date)}</div>
        </div>
        <button data-action="next" ${isFirst ? "disabled" : ""}>다음 →</button>
      </nav>

      <div class="filter-row">
        <label>
          <input type="checkbox" data-action="toggle-show-checked" ${state.showChecked ? "checked" : ""} />
          확인된 항목 보기
        </label>
        <button class="reset-btn ${state.confirmingReset ? "confirming" : ""}" data-action="reset-today">
          ${state.confirmingReset ? "다시 클릭하면 해제됩니다" : "오늘 체크 모두 해제"}
        </button>
      </div>

      <main class="cards">${cardsHtml}</main>

      ${overdueHtml}
      ${resolvedHtml}

      <footer>
        <span>mention-brief / v1.0</span>
        <span>${new Date().toLocaleString("ko-KR", { dateStyle: "medium", timeStyle: "short" })}</span>
      </footer>
    </div>`;

  const app = document.getElementById("app");
  app.className = "";
  app.innerHTML = html;

  // 이벤트 바인딩
  app.addEventListener("click", onClick);
  app.addEventListener("change", onChange);
}

function onClick(e) {
  const action = e.target.closest("[data-action]")?.dataset.action;
  if (!action) return;
  if (action === "prev") {
    state.dateIdx = Math.min(state.manifest.dates.length - 1, state.dateIdx + 1);
    render();
  } else if (action === "next") {
    state.dateIdx = Math.max(0, state.dateIdx - 1);
    render();
  } else if (action === "reset-today") {
    resetTodayChecks();
  } else if (action === "toggle-resolved") {
    state.showResolved = !state.showResolved;
    render();
  } else if (action === "show-checked") {
    state.showChecked = true;
    render();
  }
}

function onChange(e) {
  const id = e.target.dataset.toggleId;
  if (id) {
    toggle(id);
    return;
  }
  if (e.target.dataset.action === "toggle-show-checked") {
    state.showChecked = e.target.checked;
    render();
  }
}

// ====================================================================
// 시작
// ====================================================================
init();
</script>
</body>
</html>
